<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ashwamegh Market · Local Services</title>
    <style>
        /* ----- CSS Variables (professional palette) ----- */
        :root {
            --primary: #4F46E5;
            --primary-dark: #3730A3;
            --primary-light: #E0E7FF;
            --primary-gradient: linear-gradient(145deg, #4F46E5 0%, #7C3AED 100%);
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --bg: #F8FAFC;
            --card: #FFFFFF;
            --text: #0F172A;
            --text-muted: #475569;
            --border: #E2E8F0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 24px rgba(79, 70, 229, 0.08), 0 2px 8px rgba(0,0,0,0.04);
            --shadow-lg: 0 12px 40px rgba(79, 70, 229, 0.12);
            --radius-card: 20px;
            --radius-btn: 40px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px 20px 60px;
            line-height: 1.5;
        }

        /* ----- CONTAINER ----- */
        .container {
            max-width: 1240px;
            margin: 0 auto;
        }

        /* ----- HEADER (glassmorphism) ----- */
        .market-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.70);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.6);
            padding: 16px 28px;
            border-radius: 60px;
            box-shadow: var(--shadow-md);
            margin-bottom: 28px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand h1 {
            font-size: 26px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        .brand h1 span {
            font-weight: 400;
            -webkit-text-fill-color: var(--text-muted);
            opacity: 0.7;
        }
        .brand .tagline {
            font-size: 13px;
            color: var(--text-muted);
            background: var(--primary-light);
            padding: 2px 14px;
            border-radius: 40px;
            font-weight: 500;
            -webkit-text-fill-color: var(--primary);
            display: none;
        }
        @media (min-width: 640px) {
            .brand .tagline { display: inline-block; }
        }

        /* ----- REGISTER BUTTON (primary CTA) ----- */
        .register-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: var(--radius-btn);
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 8px 20px -6px rgba(79, 70, 229, 0.4);
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            letter-spacing: 0.3px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .register-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 14px 28px -8px rgba(79, 70, 229, 0.5);
        }
        .register-btn:active { transform: scale(0.96); }
        .register-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            flex-shrink: 0;
        }

        /* ----- SEARCH BAR (elevated) ----- */
        .search-container {
            margin-bottom: 32px;
        }
        .search-bar {
            display: flex;
            gap: 12px;
            background: var(--card);
            padding: 6px;
            border-radius: 60px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            transition: box-shadow 0.2s;
        }
        .search-bar:focus-within {
            box-shadow: 0 8px 28px rgba(79, 70, 229, 0.12);
            border-color: var(--primary);
        }
        .search-bar input {
            flex: 1;
            padding: 16px 24px;
            border: none;
            background: transparent;
            font-size: 15px;
            color: var(--text);
            outline: none;
            font-weight: 450;
        }
        .search-bar input::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }
        .search-bar button {
            padding: 12px 32px;
            background: var(--primary-gradient);
            color: #fff;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }
        .search-bar button:hover { opacity: 0.9; }
        .search-bar button:active { transform: scale(0.95); }
        .search-stats {
            font-size: 14px;
            color: var(--text-muted);
            padding: 10px 6px 0;
            font-weight: 450;
        }
        .search-stats strong { color: var(--text); font-weight: 600; }

        /* ===== CAROUSEL SECTIONS ===== */
        .carousel-section {
            margin-bottom: 44px;
        }
        .carousel-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 0 4px;
        }
        .carousel-header h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .carousel-header h2 small {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-muted);
            margin-left: 10px;
        }
        .carousel-nav {
            display: flex;
            gap: 12px;
        }
        .carousel-nav button {
            background: var(--card);
            border: 1px solid var(--border);
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: var(--shadow-sm);
            color: var(--text);
            font-size: 18px;
            font-weight: 300;
        }
        .carousel-nav button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(79,70,229,0.25);
        }

        /* Carousel wrapper */
        .carousel-wrapper {
            overflow: hidden;
            border-radius: var(--radius-card);
            background: var(--card);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            padding: 8px 0;
        }
        .carousel-track {
            display: flex;
            gap: 20px;
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            padding: 8px 16px;
        }

        /* ----- PRODUCT CARD (carousel item) ----- */
        .carousel-item {
            flex: 0 0 240px;
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: var(--shadow-sm);
        }
        .carousel-item:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }
        .carousel-item .image-slider {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            background: #f1f5f9;
            overflow: hidden;
        }
        .carousel-item .image-slider img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.4s ease;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
        }
        .carousel-item .image-slider img.active {
            opacity: 1;
            position: relative;
        }
        .carousel-item .slider-dots {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            padding: 3px 8px;
            border-radius: 30px;
        }
        .carousel-item .slider-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            border: none;
            cursor: pointer;
            transition: 0.2s;
            padding: 0;
        }
        .carousel-item .slider-dot.active {
            background: white;
            width: 16px;
            border-radius: 10px;
        }

        .carousel-item .card-content {
            padding: 12px 14px 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .carousel-item .card-category {
            font-size: 10px;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .carousel-item .card-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .carousel-item .card-desc {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-top: 4px;
            flex: 1;
        }
        .carousel-item .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }
        .carousel-item .card-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }
        /* ----- BIGGER WHATSAPP BUTTON (carousel) ----- */
        .carousel-item .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.25);
        }
        .carousel-item .whatsapp-btn:hover { background: #1ebe5a; transform: scale(1.02); }
        .carousel-item .whatsapp-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* Badges (smaller for carousel) */
        .carousel-item .special-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 5;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            color: #fff;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border: 1px solid rgba(255,255,255,0.15);
            pointer-events: none;
        }
        .carousel-item .special-badge.verified { background: rgba(16, 185, 129, 0.8); }
        .carousel-item .special-badge.popular { background: rgba(139, 92, 246, 0.8); }
        .carousel-item .special-badge.new { background: rgba(6, 182, 212, 0.8); }
        .carousel-item .status-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 5;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            background: var(--success);
            color: white;
            pointer-events: none;
        }
        .carousel-item .status-badge.sold { background: var(--danger); }
        .carousel-item .status-badge.reserved { background: var(--warning); }

        /* No results */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .no-results h3 { font-size: 20px; font-weight: 600; color: var(--text); }

        /* Responsive */
        @media (max-width: 700px) {
            .market-header {
                border-radius: 32px;
                padding: 14px 20px;
                flex-direction: column;
                align-items: stretch;
                gap: 14px;
            }
            .brand { justify-content: space-between; width: 100%; }
            .register-btn { width: 100%; justify-content: center; padding: 12px; }
            .search-bar { flex-direction: column; border-radius: 32px; padding: 8px; }
            .search-bar button { width: 100%; justify-content: center; }
            .carousel-item { flex: 0 0 180px; }
            .carousel-header h2 { font-size: 18px; }
            .carousel-item .whatsapp-btn { padding: 8px 14px; font-size: 12px; }
            .carousel-item .whatsapp-btn svg { width: 16px; height: 16px; }
        }
    </style>
</head>

</div>

<script>
    // ============================================================

            price: "950",

            specialType: "popular",

            images: [
                "https://images.unsplash.com/photo-1556911220-bff31c812dba?w=400&h=400&fit=crop",
                "https://images.unsplash.com/photo-1556911220-bff31c812dba?w=400&h=400&fit=crop"
            ],

        }
    ];

    // ============================================================
    //  RENDER CAROUSELS (grouped by category)
    // ============================================================
    let allProducts = [...productData];
    let carouselInstances = [];

    function groupByCategory(products) {
        const map = new Map();
        products.forEach(p => {
            const cat = p.category || 'Other';
            if (!map.has(cat)) map.set(cat, []);
            map.get(cat).push(p);
        });
        return map;
    }

    function renderCarousels(products) {
        const container = document.getElementById('carouselContainer');
        const grouped = groupByCategory(products);
        let html = '';

        let direction = 1; // 1 = right-to-left, -1 = left-to-right (alternating)
        let catIndex = 0;

        // ---- SPECIAL: "Top View" carousel (first) ----
        // We'll create a "Top View" category that shows all products (or first 6)
        const topViewItems = products.slice(0, 6);
        if (topViewItems.length > 0) {
            const dir = 'right'; // right-to-left
            const navId = `carousel-top`;
            const trackId = `track-top`;
            html += `
                <div class="carousel-section" data-category="Top View">
                    <div class="carousel-header">
                        <h2>⭐ Top View <small>${topViewItems.length} featured</small></h2>
                        <div class="carousel-nav">
                            <button class="carousel-prev" data-target="${navId}" data-dir="${dir}">‹</button>
                            <button class="carousel-next" data-target="${navId}" data-dir="${dir}">›</button>
                        </div>
                    </div>
                    <div class="carousel-wrapper" id="${navId}">
                        <div class="carousel-track" id="${trackId}">
                            ${topViewItems.map(p => renderCarouselItem(p)).join('')}
                        </div>
                    </div>
                </div>
            `;
            direction *= -1;
            catIndex++;
        }

        // ---- Regular category carousels ----
        for (let [category, items] of grouped.entries()) {
            const dir = direction === 1 ? 'right' : 'left';
            const navId = `carousel-${catIndex}`;
            const trackId = `track-${catIndex}`;

            html += `
                <div class="carousel-section" data-category="${category}">
                    <div class="carousel-header">
                        <h2>${category} <small>${items.length} services</small></h2>
                        <div class="carousel-nav">
                            <button class="carousel-prev" data-target="${navId}" data-dir="${dir}">‹</button>
                            <button class="carousel-next" data-target="${navId}" data-dir="${dir}">›</button>
                        </div>
                    </div>
                    <div class="carousel-wrapper" id="${navId}">
                        <div class="carousel-track" id="${trackId}">
                            ${items.map(p => renderCarouselItem(p)).join('')}
                        </div>
                    </div>
                </div>
            `;
            direction *= -1;
            catIndex++;
        }

        container.innerHTML = html || `<div class="no-results"><h3>No listings found</h3></div>`;

        // ----- Attach carousel controls & auto-scroll -----
        document.querySelectorAll('.carousel-section').forEach((section) => {
            const track = section.querySelector('.carousel-track');
            const prevBtn = section.querySelector('.carousel-prev');
            const nextBtn = section.querySelector('.carousel-next');
            const dir = prevBtn.dataset.dir; // 'right' or 'left'
            const step = dir === 'right' ? -1 : 1;

            let autoTimer = null;
            function scrollCarousel(delta) {
                const items = track.querySelectorAll('.carousel-item');
                if (items.length <= 1) return;
                const itemWidth = items[0].offsetWidth + 20;
                const visibleCount = Math.floor(track.parentElement.offsetWidth / itemWidth);
                const maxScroll = Math.max(0, items.length - visibleCount);

                let currentIndex = 0;
                const transform = track.style.transform;
                if (transform) {
                    const match = transform.match(/translateX\(-?(\d+)px\)/);
                    if (match) currentIndex = Math.round(parseInt(match[1]) / itemWidth);
                }

                let newIndex = currentIndex + delta;
                newIndex = Math.max(0, Math.min(newIndex, maxScroll));
                track.style.transform = `translateX(-${newIndex * itemWidth}px)`;
            }

            function autoScroll() {
                const delta = dir === 'right' ? 1 : -1;
                scrollCarousel(delta);
            }

            prevBtn.addEventListener('click', () => {
                clearInterval(autoTimer);
                const delta = dir === 'right' ? -1 : 1;
                scrollCarousel(delta);
                startAutoScroll();
            });
            nextBtn.addEventListener('click', () => {
                clearInterval(autoTimer);
                const delta = dir === 'right' ? 1 : -1;
                scrollCarousel(delta);
                startAutoScroll();
            });

            function startAutoScroll() {
                clearInterval(autoTimer);
                autoTimer = setInterval(autoScroll, 3200);
            }
            startAutoScroll();

            carouselInstances.push({ timer: autoTimer, section });
        });

        // ----- Slider dots (per item) -----
        document.querySelectorAll('.carousel-item .slider-dot').forEach(dot => {
            dot.addEventListener('click', function(e) {
                e.stopPropagation();
                const item = this.closest('.carousel-item');
                const slider = item.querySelector('.image-slider');
                const imgs = slider.querySelectorAll('img');
                const idx = parseInt(this.dataset.img);
                imgs.forEach((img, i) => img.classList.toggle('active', i === idx));
                slider.querySelectorAll('.slider-dot').forEach(d =>
                    d.classList.toggle('active', parseInt(d.dataset.img) === idx)
                );
            });
        });

        // ----- WhatsApp buttons (bigger) -----
        document.querySelectorAll('.carousel-item .whatsapp-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const phone = this.dataset.phone;
                const title = this.dataset.title;
                const price = this.dataset.price;
                if (!phone) { alert('Contact not available.'); return; }
                const msg = `Hi! I'm interested in: ${title} (₹${price}). Is it available?`;
                window.open(`https://wa.me/${phone.replace(/\s/g,'')}?text=${encodeURIComponent(msg)}`, '_blank');
            });
        });

        // ----- Auto-slide images (per item) -----
        document.querySelectorAll('.carousel-item .image-slider').forEach(slider => {
            const imgs = slider.querySelectorAll('img');
            if (imgs.length <= 1) return;
            setInterval(() => {
                let active = 0;
                imgs.forEach((img, i) => { if (img.classList.contains('active')) active = i; });
                const next = (active + 1) % imgs.length;
                imgs.forEach((img, i) => img.classList.toggle('active', i === next));
                slider.querySelectorAll('.slider-dot').forEach(d =>
                    d.classList.toggle('active', parseInt(d.dataset.img) === next)
                );
            }, 3800);
        });
    }

    function renderCarouselItem(p) {
        const images = p.images && p.images.length ? p.images : [];
        const dots = images.map((_, i) =>
            `<button class="slider-dot ${i === 0 ? 'active' : ''}" data-img="${i}"></button>`
        ).join('');
        const specialClass = p.specialType || '';
        return `
            <div class="carousel-item" data-id="${p.id}">
                ${p.special ? `<div class="special-badge ${specialClass}">${p.special}</div>` : ''}
                ${p.status && p.status !== 'Available' ? `<div class="status-badge ${p.status.toLowerCase()}">${p.status}</div>` : ''}
                <div class="image-slider">
                    ${images.map((img, i) =>
                        `<img src="${img}" class="${i === 0 ? 'active' : ''}" loading="lazy" />`
                    ).join('')}
                    ${images.length > 1 ? `<div class="slider-dots">${dots}</div>` : ''}
                </div>
                <div class="card-content">
                    <div class="card-category">${p.category || 'Service'}</div>
                    <div class="card-title">${p.title}</div>
                    <div class="card-desc">${p.description}</div>
                    <div class="card-footer">
                        <span class="card-price">₹${p.price}</span>
                        <button class="whatsapp-btn" data-phone="${p.whatsapp || ''}" data-title="${p.title}" data-price="${p.price}">
                            <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                            Chat Now
                        </button>
                    </div>
                </div>
            </div>
        `;
    }

    // ============================================================
    //  SEARCH / FILTER (re-render carousels)
    // ============================================================
    function filterAll() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        let filtered = allProducts;
        if (query) {
            filtered = allProducts.filter(p => {
                const s = [p.title, p.description, p.category, p.special || '', p.status || ''].join(' ').toLowerCase();
                return s.includes(query);
            });
        }
        document.getElementById('resultCount').textContent = filtered.length;
        // Clear old timers
        carouselInstances.forEach(inst => clearInterval(inst.timer));
        carouselInstances = [];
        renderCarousels(filtered);
    }

    // ============================================================
    //  INIT
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        renderCarousels(allProducts);
        document.getElementById('resultCount').textContent = allProducts.length;
    });
</script>
</body>
